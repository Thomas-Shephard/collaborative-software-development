services:
    maria-db:
        image: mariadb:latest
        healthcheck:
            test: [ "CMD", "healthcheck.sh", "--su-mysql", "--connect","--innodb_initialized" ]
            start_period: 30s
            start_interval: 1s
            interval: 30s
            retries: 3
        environment:
            - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
            - MYSQL_DATABASE=${DB_NAME}
            - MYSQL_USER=${DB_USER}
            - MYSQL_PASSWORD=${DB_PASSWORD}
        volumes:
            - maria-db-data:/var/lib/mysql
            - ./database-init.sql:/docker-entrypoint-initdb.d/init.sql
        env_file: .env
    php-my-admin:
        image: phpmyadmin:latest
        environment:
            - PMA_HOST=${DB_HOST}
            - PMA_USER=${DB_USER}
            - PMA_PASSWORD=${DB_PASSWORD}
        ports:
            - "${PHP_MY_ADMIN_PORT:-8080}:80"
        depends_on:
            maria-db:
                condition: service_healthy
        env_file: .env
    mailhog:
        image: mailhog/mailhog
        ports:
            - "1025:1025"
            - "8025:8025"
    jahoot-web-api:
        build:
            dockerfile: ./src/Jahoot.WebApi/Dockerfile
        ports:
            - "${APP_PORT:-80}:8080"
        environment:
            - SMTP_HOST=${SMTP_HOST:-mailhog}
            - SMTP_PORT=${SMTP_PORT:-1025}
            - SMTP_USER=${SMTP_USER}
            - SMTP_PASSWORD=${SMTP_PASSWORD}
            - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@jahoot.com}
            - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Jahoot}
            - SMTP_ENABLE_SSL=${SMTP_ENABLE_SSL:-false}
        depends_on:
            maria-db:
                condition: service_healthy
            mailhog:
                condition: service_started
        env_file: .env

volumes:
    maria-db-data:
